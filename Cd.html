<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <style>
        body { margin: 0; overflow: hidden; background: #fdfbf7; font-family: 'Georgia', serif; }
        #invitation {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 70%;
            z-index: -1;
            opacity: 0; /* Starts hidden */
        }
        h1 { font-size: 3rem; color: #444; margin: 10px 0; font-style: italic; }
        p { color: #888; letter-spacing: 2px; text-transform: uppercase; font-size: 0.8rem; }
        canvas { display: block; cursor: pointer; }
    </style>
</head>
<body>

    <div id="invitation">
        <p>Save The Date</p>
        <h1>Sam & Sofia</h1>
        <p>December 12, 2027</p>
        <p style="margin-top: 20px; font-style: italic; text-transform: none;">We can't wait to celebrate with you</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        let scene, camera, renderer, leftCurtain, rightCurtain;
        let isOpen = false;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = 12;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Lighting setup for high-contrast shadows
            const light = new THREE.DirectionalLight(0xffffff, 1.2);
            light.position.set(2, 5, 10);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));

            // Procedural Velvet Material
            const material = new THREE.MeshStandardMaterial({
                color: 0x9e0000,
                roughness: 0.5,
                metalness: 0.1,
                side: THREE.DoubleSide
            });

            // High density geometry (120 segments for silk-like folds)
            const geometry = new THREE.PlaneGeometry(10, 18, 120, 120);

            leftCurtain = new THREE.Mesh(geometry, material);
            leftCurtain.position.x = -5.05; // Tight center meeting
            scene.add(leftCurtain);

            rightCurtain = new THREE.Mesh(geometry.clone(), material);
            rightCurtain.position.x = 5.05;
            scene.add(rightCurtain);

            window.addEventListener('mousedown', openCurtains);
            window.addEventListener('resize', onResize);
        }

        function openCurtains() {
            if (isOpen) return;
            isOpen = true;

            // Fade in the text behind
            gsap.to("#invitation", { opacity: 1, duration: 2, delay: 0.5 });

            const duration = 3.0;
            const revealProgress = { val: 0 };

            gsap.to(revealProgress, {
                val: 1,
                duration: duration,
                ease: "power2.inOut",
                onUpdate: () => {
                    updateCurtainShape(leftCurtain, revealProgress.val, 1);
                    updateCurtainShape(rightCurtain, revealProgress.val, -1);
                }
            });
        }

        function updateCurtainShape(mesh, progress, side) {
            const pos = mesh.geometry.attributes.position;
            
            for (let i = 0; i < pos.count; i++) {
                // Get original coordinates
                let x = (i % 121) / 12 - 5; // Local X relative to mesh center
                let y = 9 - Math.floor(i / 121) / 12 * 1.2; // Local Y

                // 1. The Folds (Vertical lines)
                // We increase fold frequency as it gathers
                let foldFreq = 4 + (progress * 8);
                let foldDepth = 0.3 * (1 - progress * 0.5);
                let z = Math.sin(x * foldFreq) * foldDepth;

                // 2. The Pull-Back (Rope effect)
                // Tie-back point is roughly at y = -2
                let distanceToTie = Math.abs(y - (-2));
                let pullStrength = Math.pow(Math.max(0, 1 - distanceToTie / 10), 2);
                
                // Curve X: Bottom and Middle pull more than the top
                let xOffset = progress * 7 * pullStrength * side;
                
                // Slight Y lift to simulate fabric bunching up
                let yOffset = progress * Math.pow(pullStrength, 2) * 1.5;

                pos.setXY(i, x + xOffset, y + yOffset);
                pos.setZ(i, z + (progress * pullStrength * 2)); // Pushes folds forward
            }
            
            pos.needsUpdate = true;
            mesh.geometry.computeVertexNormals();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isOpen) {
                // Pre-click subtle breathing
                let time = Date.now() * 0.002;
                [leftCurtain, rightCurtain].forEach((m, idx) => {
                    const p = m.geometry.attributes.position;
                    for (let i = 0; i < p.count; i++) {
                        let x = p.getX(i);
                        let y = p.getY(i);
                        p.setZ(i, Math.sin(x * 4 + time + idx) * 0.2);
                    }
                    p.needsUpdate = true;
                });
            }
            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Wedding Reveal</title>
    <style>
        body { margin: 0; overflow: hidden; background: #fff; font-family: 'Georgia', serif; }
        #invitation-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: -1;
            width: 100%;
            pointer-events: none;
        }
        h1 { font-size: 3.5rem; color: #333; margin: 10px 0; font-style: italic; }
        p { color: #888; letter-spacing: 5px; text-transform: uppercase; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="invitation-text">
        <p>Save The Date</p>
        <h1>Sam & Sofia</h1>
        <p>December 12th, 2027</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        let scene, camera, renderer, leftCurtain, rightCurtain;
        let isOpen = false;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = 15;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Bright, consistent lighting to prevent color shifts
            const ambient = new THREE.AmbientLight(0xffffff, 0.9);
            scene.add(ambient);
            const directional = new THREE.DirectionalLight(0xffffff, 0.5);
            directional.position.set(0, 10, 10);
            scene.add(directional);

            // Deep Red Velvet Material
            const material = new THREE.MeshStandardMaterial({
                color: 0x9e0000,
                roughness: 0.8,
                metalness: 0,
                side: THREE.DoubleSide
            });

            // High segment count for realistic curving
            const geometry = new THREE.PlaneGeometry(12, 22, 120, 120);

            leftCurtain = new THREE.Mesh(geometry, material);
            leftCurtain.position.x = -6;
            scene.add(leftCurtain);

            rightCurtain = new THREE.Mesh(geometry.clone(), material);
            rightCurtain.position.x = 6;
            scene.add(rightCurtain);

            window.addEventListener('click', handleReveal);
            window.addEventListener('resize', onResize);
        }

        function handleReveal() {
            if (isOpen) return;
            isOpen = true;

            const animation = { progress: 0 };
            gsap.to(animation, {
                progress: 1,
                duration: 3.5,
                ease: "power2.inOut",
                onUpdate: () => {
                    updateCurtain(leftCurtain, animation.progress, 1);
                    updateCurtain(rightCurtain, animation.progress, -1);
                }
            });
        }

        function updateCurtain(mesh, progress, direction) {
            const pos = mesh.geometry.attributes.position;
            
            for (let i = 0; i < pos.count; i++) {
                // Initial Grid Coordinates
                let xOrig = (i % 121) / 10 - 6; 
                let yOrig = 11 - Math.floor(i / 121) / 10 * 1.83;

                // FIX: "Pin" the top. Factor is 0 at top, 1 at bottom.
                // This prevents the curtain from flying "up"
                let verticalFactor = Math.max(0, (11 - yOrig) / 22);

                // THE SWOOP: vertices pull toward the side center
                // direction is 1 for left curtain, -1 for right
                let pullX = progress * 10 * verticalFactor * direction;
                
                // THE LIFT: simulating fabric bunching at the tie-back
                let liftY = progress * 3 * Math.sin(verticalFactor * Math.PI);

                // THE FOLDS: vertical ridges
                let foldFreq = 3;
                let z = Math.sin(xOrig * foldFreq) * (0.4 * (1 - progress));

                pos.setXY(i, xOrig + pullX, yOrig + liftY);
                pos.setZ(i, z + (progress * verticalFactor * 2));
            }
            
            pos.needsUpdate = true;
            mesh.geometry.computeVertexNormals();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isOpen) {
                let time = Date.now() * 0.002;
                [leftCurtain, rightCurtain].forEach((m, idx) => {
                    const p = m.geometry.attributes.position;
                    for (let i = 0; i < p.count; i++) {
                        let x = p.getX(i);
                        p.setZ(i, Math.sin(x * 3 + time + idx) * 0.15);
                    }
                    p.needsUpdate = true;
                });
            }
            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>

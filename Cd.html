<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Reveal</title>
    <style>
        body { margin: 0; overflow: hidden; background: #fff; }
        #text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: -1;
            font-family: 'Georgia', serif;
        }
    </style>
</head>
<body>

    <div id="text">
        <p style="letter-spacing:5px; color:#888;">SAVE THE DATE</p>
        <h1 style="font-size:3rem; font-style:italic;">Sam & Sofia</h1>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        let scene, camera, renderer, leftCurtain, rightCurtain;
        let isOpen = false;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = 15;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0xffffff, 1);
            document.body.appendChild(renderer.domColor);

            const ambient = new THREE.AmbientLight(0xffffff, 1.2);
            scene.add(ambient);

            // Using a basic material first to ensure colors are solid red
            const material = new THREE.MeshStandardMaterial({
                color: 0xcc0000,
                roughness: 1,
                side: THREE.DoubleSide
            });

            // Geometry with high segments for smooth curves
            const geometry = new THREE.PlaneGeometry(12, 24, 80, 80);

            leftCurtain = new THREE.Mesh(geometry, material);
            leftCurtain.position.set(-6, 0, 0);
            scene.add(leftCurtain);

            rightCurtain = new THREE.Mesh(geometry.clone(), material);
            rightCurtain.position.set(6, 0, 0);
            scene.add(rightCurtain);

            window.addEventListener('click', () => {
                if(!isOpen) {
                    isOpen = true;
                    reveal();
                }
            });
        }

        function reveal() {
            let ctrl = { p: 0 };
            gsap.to(ctrl, {
                p: 1,
                duration: 3,
                ease: "power2.inOut",
                onUpdate: () => {
                    updateCurtain(leftCurtain, ctrl.p, 1);
                    updateCurtain(rightCurtain, ctrl.p, -1);
                }
            });
        }

        function updateCurtain(mesh, p, side) {
            const pos = mesh.geometry.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                // Original local coordinates
                let x0 = (i % 81) / 80 * 12 - 6;
                let y0 = 12 - Math.floor(i / 81) / 80 * 24;

                // 1. PIN THE TOP: y=12 is the top. (12-y0)/24 is 0 at top, 1 at bottom.
                let pinFactor = (12 - y0) / 24;

                // 2. THE SWOOP: Vertices pull more in the middle (using Sine)
                let swoop = Math.sin(pinFactor * Math.PI);
                let moveX = p * 10 * swoop * side;
                
                // 3. THE LIFT: Pull the fabric up as it moves sideways
                let moveY = p * 5 * pinFactor;

                // 4. THE FOLDS: Constant vertical ridges
                let fold = Math.sin(x0 * 4) * 0.5 * (1 - p);

                pos.setXY(i, x0 + moveX, y0 + moveY);
                pos.setZ(i, fold + (p * swoop * 3));
            }
            pos.needsUpdate = true;
            mesh.geometry.computeVertexNormals();
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <style>
        body { margin: 0; overflow: hidden; background: #fffdf9; font-family: 'Georgia', serif; }
        #card {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: -1;
            width: 100%;
        }
        h1 { font-size: 3rem; color: #333; margin: 0; font-style: italic; }
        p { color: #666; letter-spacing: 4px; text-transform: uppercase; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div id="card">
        <p>The Wedding of</p>
        <h1>Sam & Sofia</h1>
        <p>Save the Date | 2027</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        let scene, camera, renderer, leftCurtain, rightCurtain;
        let isOpen = false;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = 10;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Studio Lighting (To keep red color consistent)
            const ambient = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambient);

            const spot = new THREE.DirectionalLight(0xffffff, 0.8);
            spot.position.set(0, 5, 10);
            scene.add(spot);

            // Realistic Velvet Material
            // We use MeshStandardMaterial with high roughness for that "matte" look
            const curtainMat = new THREE.MeshStandardMaterial({
                color: 0xaa0000, // Deep Red
                roughness: 1,
                metalness: 0,
                side: THREE.DoubleSide
            });

            // High-detail geometry (150 segments) for smooth "rope" curves
            const geometry = new THREE.PlaneGeometry(8, 14, 150, 150);

            leftCurtain = new THREE.Mesh(geometry, curtainMat);
            leftCurtain.position.x = -4;
            scene.add(leftCurtain);

            rightCurtain = new THREE.Mesh(geometry.clone(), curtainMat);
            rightCurtain.position.x = 4;
            scene.add(rightCurtain);

            window.addEventListener('click', openTheaterCurtains);
            window.addEventListener('resize', onResize);
        }

        function openTheaterCurtains() {
            if (isOpen) return;
            isOpen = true;

            const tl = gsap.timeline();
            const progressObj = { value: 0 };

            tl.to(progressObj, {
                value: 1,
                duration: 3,
                ease: "power2.inOut",
                onUpdate: () => {
                    deformCurtain(leftCurtain, progressObj.value, 1);
                    deformCurtain(rightCurtain, progressObj.value, -1);
                }
            });
        }

        function deformCurtain(mesh, progress, side) {
            const pos = mesh.geometry.attributes.position;
            
            for (let i = 0; i < pos.count; i++) {
                // Get the original coordinates of each "cloth" particle
                let xOrig = (i % 151) / 18.75 - 4; 
                let yOrig = 7 - Math.floor(i / 151) / 10.7;

                // 1. PIN THE TOP: The higher the Y, the less it moves
                let pinTop = Math.pow((7 - yOrig) / 14, 0.5);

                // 2. THE ROPE PULL: We pull from a point on the side (y = -1)
                let distToRope = Math.abs(yOrig - (-1));
                let ropeInfluence = Math.max(0, 1 - distToRope / 8);
                
                // Horizontal shift (Swoop)
                let moveX = progress * 6 * ropeInfluence * side * pinTop;
                
                // Vertical lift (Fabric bunching)
                let moveY = progress * 2 * ropeInfluence * pinTop;

                // 3. FOLD DENSITY: Add small zig-zags to simulate bunched fabric
                let folds = Math.sin(xOrig * (10 + progress * 20)) * (0.2 * (1 - progress * 0.5));

                pos.setXY(i, xOrig + moveX, yOrig + moveY);
                pos.setZ(i, folds + (progress * ropeInfluence * 2));
            }
            
            pos.needsUpdate = true;
            mesh.geometry.computeVertexNormals(); // Recalculate shadows for the new shape
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isOpen) {
                // Natural fabric "breathing"
                let time = Date.now() * 0.001;
                [leftCurtain, rightCurtain].forEach((m) => {
                    const p = m.geometry.attributes.position;
                    for (let i = 0; i < p.count; i++) {
                        let x = p.getX(i);
                        p.setZ(i, Math.sin(x * 5 + time) * 0.1);
                    }
                    p.needsUpdate = true;
                });
            }
            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>

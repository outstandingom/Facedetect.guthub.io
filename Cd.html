<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <style>
        body { margin: 0; overflow: hidden; background: #fffdf5; font-family: 'serif'; }
        #invitation {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: -1;
        }
        h1 { font-size: 3.5rem; color: #333; font-style: italic; margin: 0; }
        p { color: #999; letter-spacing: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="invitation">
        <p>You're Invited</p>
        <h1>Sam & Sofia</h1>
        <p>2027 . 12 . 25</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        let scene, camera, renderer, leftCurtain, rightCurtain;
        let isOpen = false;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = 12;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lighting to keep that deep red velvet look
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const light = new THREE.DirectionalLight(0xffffff, 0.5);
            light.position.set(5, 5, 10);
            scene.add(light);

            const material = new THREE.MeshStandardMaterial({
                color: 0xaa0000,
                roughness: 0.9,
                metalness: 0,
                side: THREE.DoubleSide
            });

            // High resolution plane
            const geometry = new THREE.PlaneGeometry(10, 18, 100, 100);

            leftCurtain = new THREE.Mesh(geometry, material);
            leftCurtain.position.x = -5;
            scene.add(leftCurtain);

            rightCurtain = new THREE.Mesh(geometry.clone(), material);
            rightCurtain.position.x = 5;
            scene.add(rightCurtain);

            window.addEventListener('click', openCurtains);
        }

        function openCurtains() {
            if (isOpen) return;
            isOpen = true;

            let reveal = { progress: 0 };
            gsap.to(reveal, {
                progress: 1,
                duration: 3,
                ease: "power2.inOut",
                onUpdate: () => {
                    deform(leftCurtain, reveal.progress, 1);
                    deform(rightCurtain, reveal.progress, -1);
                }
            });
        }

        function deform(mesh, progress, side) {
            const pos = mesh.geometry.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                // Get original grid positions
                let x = (i % 101) / 10 - 5;
                let y = 9 - Math.floor(i / 101) / 5.55;

                // 1. ANCHOR: The top (y=9) stays fixed.
                let pinTop = Math.max(0, (9 - y) / 18);

                // 2. THE SWOOP: Pull center-side more than top/bottom
                // This creates the "curved" rope look from your photo
                let ropePull = Math.sin(pinTop * Math.PI); 
                let moveX = progress * 8 * ropePull * side;
                
                // 3. THE BUNCH: Pull the bottom up slightly as it moves side
                let moveY = progress * 4 * Math.pow(pinTop, 2);

                // 4. FOLDS: Keep vertical lines deep
                let z = Math.sin(x * 5) * 0.4 * (1 - progress * 0.5);

                pos.setXY(i, x + moveX, y + moveY);
                pos.setZ(i, z + (progress * ropePull * 2));
            }
            pos.needsUpdate = true;
            mesh.geometry.computeVertexNormals();
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>

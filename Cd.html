<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Wedding Reveal</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'serif'; }
        #content {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #d4af37; /* Gold */
            text-align: center;
            z-index: -1;
        }
        .hint {
            position: absolute;
            bottom: 30px; width: 100%;
            text-align: center; color: white;
            letter-spacing: 2px; animate: pulse 2s infinite;
        }
        @keyframes pulse { 0% {opacity: 0.3} 50% {opacity: 1} 100% {opacity: 0.3} }
    </style>
</head>
<body>

    <div id="content">
        <h1 style="font-size: 3rem;">A & B</h1>
        <p style="font-size: 1.5rem;">The Grand Wedding</p>
        <p>2026 . 12 . 25</p>
    </div>

    <div class="hint">CLICK TO OPEN</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        let scene, camera, renderer, leftCurtain, rightCurtain;
        let clock = new THREE.Clock();
        let isOpen = false;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0, 10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Cinematic Lighting
            const ambient = new THREE.AmbientLight(0xffffff, 0.2);
            scene.add(ambient);

            const spotlight = new THREE.PointLight(0xffffff, 1.5);
            spotlight.position.set(0, 5, 5);
            scene.add(spotlight);

            // Procedural Velvet Material (No Images!)
            // We use a custom color logic to simulate fabric shadows
            const curtainMat = new THREE.MeshStandardMaterial({
                color: 0x990000,
                roughness: 0.8,
                metalness: 0.2,
                side: THREE.DoubleSide
            });

            // Create Curtain Geometry (High density for folds)
            const geometry = new THREE.PlaneGeometry(6, 12, 64, 64);
            
            // Apply initial "folded" look via vertex math
            applyFolds(geometry);

            leftCurtain = new THREE.Mesh(geometry, curtainMat);
            leftCurtain.position.x = -3;
            scene.add(leftCurtain);

            rightCurtain = new THREE.Mesh(geometry.clone(), curtainMat);
            rightCurtain.position.x = 3;
            scene.add(rightCurtain);

            window.addEventListener('mousedown', openCurtains);
            window.addEventListener('resize', onResize);
        }

        function applyFolds(geo) {
            const pos = geo.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                let x = pos.getX(i);
                let y = pos.getY(i);
                // Create vertical "tube" folds using Sine
                let fold = Math.sin(x * 5) * 0.2;
                pos.setZ(i, fold);
            }
            pos.needsUpdate = true;
            geo.computeVertexNormals();
        }

        function openCurtains() {
            if (isOpen) return;
            isOpen = true;
            
            document.querySelector('.hint').style.display = 'none';

            // Animation 1: Move them to the side
            gsap.to(leftCurtain.position, { x: -8, duration: 3, ease: "power2.inOut" });
            gsap.to(rightCurtain.position, { x: 8, duration: 3, ease: "power2.inOut" });

            // Animation 2: Bunching effect (Scaling X while pulling Z)
            gsap.to(leftCurtain.scale, { x: 0.3, duration: 3, ease: "power2.inOut" });
            gsap.to(rightCurtain.scale, { x: 0.3, duration: 3, ease: "power2.inOut" });
        }

        function animate() {
            requestAnimationFrame(animate);
            let t = clock.getElapsedTime();

            // Make the curtains "breathe" or sway slightly
            [leftCurtain, rightCurtain].forEach((mesh, index) => {
                const pos = mesh.geometry.attributes.position;
                for (let i = 0; i < pos.count; i++) {
                    let y = pos.getY(i);
                    let x = pos.getX(i);
                    // Wave movement
                    let wave = Math.sin(y * 0.5 + t + (index * Math.PI)) * 0.05;
                    // Only sway the bottom more than the top (pinned top)
                    let influence = (6 - y) / 12; 
                    pos.setZ(i, (Math.sin(x * 5) * 0.2) + (wave * influence));
                }
                pos.needsUpdate = true;
            });

            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation Reveal</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: 'Georgia', serif; }
        #invitation {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #555;
            z-index: -1;
            width: 80%;
        }
        h1 { font-size: 3.5rem; margin: 0; color: #333; font-style: italic; }
        p { letter-spacing: 3px; text-transform: uppercase; size: 0.9rem; }
    </style>
</head>
<body>

    <div id="invitation">
        <p>You are cordially invited to the wedding of</p>
        <h1>Sam & Sofia</h1>
        <hr style="width:50px; border: 1px solid #ddd; margin: 20px auto;">
        <p>December 12th, 2027</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        let scene, camera, renderer, leftCurtain, rightCurtain;
        let clock = new THREE.Clock();
        let isOpen = false;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = 12;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Lighting for Deep Shadows (The "Image" Look)
            const light = new THREE.DirectionalLight(0xffffff, 1.2);
            light.position.set(5, 5, 10);
            scene.add(light);

            const rimLight = new THREE.PointLight(0xffffff, 0.8);
            rimLight.position.set(-5, -5, 2);
            scene.add(rimLight);

            const ambient = new THREE.AmbientLight(0xffffff, 0.3);
            scene.add(ambient);

            // Material with strong shadows
            const material = new THREE.MeshStandardMaterial({
                color: 0xb30000,
                roughness: 0.6,
                metalness: 0.1,
                side: THREE.DoubleSide
            });

            // High density geometry for smooth folding
            const geometry = new THREE.PlaneGeometry(10, 16, 100, 100);

            leftCurtain = new THREE.Mesh(geometry, material);
            leftCurtain.position.x = -5;
            scene.add(leftCurtain);

            rightCurtain = new THREE.Mesh(geometry.clone(), material);
            rightCurtain.position.x = 5;
            scene.add(rightCurtain);

            window.addEventListener('mousedown', toggleReveal);
            window.addEventListener('resize', onResize);
        }

        function toggleReveal() {
            if (isOpen) return;
            isOpen = true;

            // GSAP for the "Pulling" animation
            const duration = 3.5;
            const ease = "power2.inOut";

            // Move the whole meshes outward
            gsap.to(leftCurtain.position, { x: -14, duration: duration, ease: ease });
            gsap.to(rightCurtain.position, { x: 14, duration: duration, ease: ease });

            // Animate a custom "pull" factor for the vertices
            let pull = { value: 0 };
            gsap.to(pull, {
                value: 1,
                duration: duration,
                ease: ease,
                onUpdate: () => updateFolds(pull.value)
            });
        }

        function updateFolds(progress) {
            [leftCurtain, rightCurtain].forEach((mesh, index) => {
                const pos = mesh.geometry.attributes.position;
                const side = index === 0 ? 1 : -1;

                for (let i = 0; i < pos.count; i++) {
                    let x = pos.getX(i);
                    let y = pos.getY(i);
                    
                    // 1. Initial Fold Density (The vertical lines)
                    let fold = Math.sin(x * 4) * 0.3;

                    // 2. The Pull Effect (Curving the fabric back)
                    // The lower the Y (bottom of curtain), the more it gets pulled back (X)
                    // We calculate "how much to pull" based on Y position (pinned at top Y=8)
                    let pullStrength = Math.max(0, (8 - y) / 16);
                    let pullX = progress * 8 * pullStrength * side;

                    // Apply to geometry
                    pos.setX(i, x + pullX);
                    pos.setZ(i, fold + (progress * pullStrength * 3)); // Pulls depth too
                }
                pos.needsUpdate = true;
                mesh.geometry.computeVertexNormals();
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            let time = clock.getElapsedTime();

            if (!isOpen) {
                // Gentle sway before clicking
                [leftCurtain, rightCurtain].forEach((mesh) => {
                    const pos = mesh.geometry.attributes.position;
                    for (let i = 0; i < pos.count; i++) {
                        let x = pos.getX(i);
                        let y = pos.getY(i);
                        let wave = Math.sin(y * 0.3 + time) * 0.1;
                        pos.setZ(i, (Math.sin(x * 4) * 0.3) + wave);
                    }
                    pos.needsUpdate = true;
                });
            }
            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Core Background</title>
    <style>
        body { margin: 0; overflow: hidden; background: #010103; font-family: sans-serif; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: -1; }
        
        /* Fallback background if WebGL fails */
        .fallback {
            position: fixed;
            inset: 0;
            z-index: -10;
            background: radial-gradient(ellipse at center, #0a1628 0%, #010103 70%);
        }
    </style>
</head>
<body>

    <div id="fallback" class="fallback" style="display: none;"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Configuration ---
        const STAR_COUNT = 260;
        const CONNECTION_DISTANCE = 48;
        let reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        // --- State ---
        let scene, camera, renderer, starGroup, stars, lines;
        let comets = [];
        let currentColor = new THREE.Color(0x00d2ff);

        // --- Helpers ---
        function isWebGLAvailable() {
            try {
                const canvas = document.createElement("canvas");
                return !!(window.WebGLRenderingContext && (canvas.getContext("webgl") || canvas.getContext("experimental-webgl")));
            } catch (e) { return false; }
        }

        function createGlowTexture() {
            const canvas = document.createElement("canvas");
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext("2d");
            const g = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            g.addColorStop(0, "#fff");
            g.addColorStop(0.3, "rgba(255,255,255,0.8)");
            g.addColorStop(1, "transparent");
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }

        // --- Comet Logic ---
        class Comet {
            constructor(pos, vel, color) {
                this.id = Math.random();
                this.life = 1.0;
                this.position = pos.clone();
                this.velocity = vel.clone();
                this.color = color;
                
                // Head
                const geo = new THREE.SphereGeometry(2.5, 8, 8);
                const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, blending: THREE.AdditiveBlending });
                this.mesh = new THREE.Mesh(geo, mat);
                
                // Trail
                const trailGeo = new THREE.BufferGeometry();
                this.trailPositions = new Float32Array(15 * 3);
                for(let i=0; i<45; i++) this.trailPositions[i] = pos.getComponent(i % 3);
                trailGeo.setAttribute('position', new THREE.BufferAttribute(this.trailPositions, 3));
                
                this.trailLine = new THREE.Line(trailGeo, new THREE.LineBasicMaterial({
                    color: color, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending
                }));

                scene.add(this.mesh);
                scene.add(this.trailLine);
            }

            update() {
                this.position.add(this.velocity);
                this.velocity.multiplyScalar(0.98);
                this.life -= 0.015;

                this.mesh.position.copy(this.position);
                this.mesh.scale.setScalar(this.life);

                // Update Trail History (Shift values)
                for (let i = 14; i > 0; i--) {
                    this.trailPositions[i * 3] = this.trailPositions[(i - 1) * 3];
                    this.trailPositions[i * 3 + 1] = this.trailPositions[(i - 1) * 3 + 1];
                    this.trailPositions[i * 3 + 2] = this.trailPositions[(i - 1) * 3 + 2];
                }
                this.trailPositions[0] = this.position.x;
                this.trailPositions[1] = this.position.y;
                this.trailPositions[2] = this.position.z;

                this.trailLine.geometry.attributes.position.needsUpdate = true;
                this.trailLine.material.opacity = this.life;

                if (this.life <= 0) this.destroy();
            }

            destroy() {
                scene.remove(this.mesh);
                scene.remove(this.trailLine);
                comets = comets.filter(c => c !== this);
            }
        }

        // --- Initialization ---
        function init() {
            if (!isWebGLAvailable()) {
                document.getElementById('fallback').style.display = 'block';
                return;
            }

            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x010103, 0, 1000);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 3000);
            camera.position.z = 500;

            renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x010103, 1);
            document.body.appendChild(renderer.domElement);

            starGroup = new THREE.Group();
            scene.add(starGroup);

            // Create Star and Line Geometry
            const positions = [];
            const radius = 120;
            for (let i = 0; i < STAR_COUNT; i++) {
                const phi = Math.acos(-1 + (2 * i) / STAR_COUNT);
                const theta = Math.sqrt(STAR_COUNT * Math.PI) * phi;
                positions.push(
                    radius * Math.cos(theta) * Math.sin(phi),
                    radius * Math.sin(theta) * Math.sin(phi),
                    radius * Math.cos(phi)
                );
            }

            const starGeo = new THREE.BufferGeometry();
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            stars = new THREE.Points(starGeo, new THREE.PointsMaterial({
                size: 10, map: createGlowTexture(), transparent: true, color: currentColor,
                blending: THREE.AdditiveBlending, depthWrite: false
            }));
            starGroup.add(stars);

            const linePositions = [];
            for (let i = 0; i < STAR_COUNT; i++) {
                for (let j = i + 1; j < STAR_COUNT; j++) {
                    const v1 = new THREE.Vector3(positions[i*3], positions[i*3+1], positions[i*3+2]);
                    const v2 = new THREE.Vector3(positions[j*3], positions[j*3+1], positions[j*3+2]);
                    if (v1.distanceTo(v2) < CONNECTION_DISTANCE) {
                        linePositions.push(v1.x, v1.y, v1.z, v2.x, v2.y, v2.z);
                    }
                }
            }

            const lineGeo = new THREE.BufferGeometry();
            lineGeo.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));
            lines = new THREE.LineSegments(lineGeo, new THREE.LineBasicMaterial({
                color: currentColor, transparent: true, opacity: 0.18, blending: THREE.AdditiveBlending
            }));
            starGroup.add(lines);

            // Events
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousedown', shedSkin);
            window.addEventListener('touchstart', shedSkin);

            animate();
        }

        function shedSkin() {
            if (reducedMotion) return;

            const posAttr = stars.geometry.attributes.position;
            const oldColorHex = currentColor.getHex();

            for (let i = 0; i < posAttr.count; i++) {
                const localPos = new THREE.Vector3().fromBufferAttribute(posAttr, i);
                const worldPos = localPos.applyMatrix4(stars.matrixWorld);
                const dir = worldPos.clone().normalize().multiplyScalar(Math.random() * 10 + 5);
                comets.push(new Comet(worldPos, dir, oldColorHex));
            }

            currentColor.setHSL(Math.random(), 1, 0.6);
            stars.material.color.set(currentColor);
            lines.material.color.set(currentColor);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (!reducedMotion) {
                const scrollP = window.pageYOffset / (document.body.scrollHeight - window.innerHeight || 1);
                starGroup.rotation.y += 0.004;
                starGroup.rotation.x += 0.0015;
                const scale = 1 + scrollP * 3.5;
                starGroup.scale.set(scale, scale, scale);
            }

            comets.forEach(c => c.update());
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>

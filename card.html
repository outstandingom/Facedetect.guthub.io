<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wedding Invite</title>
</head>
<body style="margin:0">

<video id="inviteVideo" width="100%" playsinline preload="auto">
  <source src="VID-20260422-WA0010.mp4" type="video/mp4">
</video>

<script>
  const video = document.getElementById("inviteVideo");

  // Prepare video (important for smooth start)
  video.muted = true;
  video.load();

  // Play ONLY on tap
  function startVideo() {
    video.muted = false;
    video.play().then(() => {
      // remove listeners after first play
      document.removeEventListener("click", startVideo);
      document.removeEventListener("touchstart", startVideo);
    }).catch(err => console.log(err));
  }

  document.addEventListener("click", startVideo);
  document.addEventListener("touchstart", startVideo);

  // Freeze at last frame
  video.addEventListener("ended", () => {
    video.pause();
    video.currentTime = video.duration;
  });
</script>

</body>
</html>

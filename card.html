<!DOCTYPE html>
<html>
<body style="margin:0">

<!-- Video -->
<video id="curtainVideo" width="100%" playsinline preload="auto">
  <source src="VID-20260422-WA0010.mp4" type="video/mp4">
</video>

<!-- Hidden Content -->
<div id="content" style="display:none; text-align:center;">
  <h3>WE'RE GETTING MARRIED</h3>
  <h1>Om & Partner</h1>
  <p>Monday, October 19, 2026</p>
  <p>Royal Theatre</p>
</div>

<script>
  const video = document.getElementById("curtainVideo");
  const content = document.getElementById("content");

  // IMPORTANT: make video ready
  video.muted = true;   // required for smooth start
  video.load();

  function startVideo() {
    video.muted = false; // unmute after click
    video.play().then(() => {
      console.log("Video started");
    }).catch(err => {
      console.log("Play error:", err);
    });

    // remove listeners after first click
    window.removeEventListener("click", startVideo);
    window.removeEventListener("touchstart", startVideo);
  }

  // Use window instead of document (more reliable)
  window.addEventListener("click", startVideo);
  window.addEventListener("touchstart", startVideo);

  // Show content after video ends
  video.addEventListener("ended", () => {
    content.style.display = "block";
  });
</script>

</body>
</html>

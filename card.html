<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wedding Invite</title>
</head>
<body>

<video id="inviteVideo" width="100%" playsinline preload="auto">
  <source src="VID-20260422-WA0010.mp4" type="video/mp4">
</video>

<script>
  const video = document.getElementById("inviteVideo");

  // Play ONLY when user taps the video
  video.addEventListener("click", function () {
    video.currentTime = 0;
    video.play().catch(err => console.log(err));
  }, { once: true });

  video.addEventListener("touchstart", function () {
    video.currentTime = 0;
    video.play().catch(err => console.log(err));
  }, { once: true });

  // Stop at last frame
  video.addEventListener("ended", function () {
    video.pause();
    video.currentTime = video.duration;
  });
</script>

</body>
</html>

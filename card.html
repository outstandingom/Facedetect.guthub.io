<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
</head>
<body style="margin:0; overflow:hidden;">

<!-- Curtains -->
<div id="left" style="position:fixed; width:50%; height:100%; background:red; left:0;"></div>
<div id="right" style="position:fixed; width:50%; height:100%; background:red; right:0;"></div>

<!-- Content -->
<div id="content" style="display:none; text-align:center; margin-top:50%;">
  <h1>Om & Partner</h1>
  <p>October 19, 2026</p>
</div>

<script>
  document.addEventListener("click", () => {
    gsap.to("#left", { x: "-100%", duration: 2 });
    gsap.to("#right", { x: "100%", duration: 2 });

    setTimeout(() => {
      document.getElementById("content").style.display = "block";
    }, 2000);
  }, { once: true });
</script>

</body>
</html>

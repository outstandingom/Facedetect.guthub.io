

<!DOCTYPE html>
<html>
<body style="margin:0">

<!-- Video -->
<video id="video" width="100%" playsinline preload="auto">
  <source src="VID-20260422-WA0010.mp4" type="video/mp4">
</video>

<script>
  const video = document.getElementById("video");

  // Preload properly
  video.muted = true;   // helps browser allow buffering
  video.load();

  // Play on first tap anywhere
  function start() {
    video.muted = false;
    video.play().catch(e => console.log(e));

    window.removeEventListener("click", start);
    window.removeEventListener("touchstart", start);
  }

  window.addEventListener("click", start);
  window.addEventListener("touchstart", start);

  // Stop at last frame
  video.addEventListener("ended", () => {
    video.pause();
    video.currentTime = video.duration;
  });
</script>

</body>
</html>

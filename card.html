<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wedding Invite</title>
</head>
<body>

<video id="inviteVideo" width="100%" playsinline preload="auto">
  <source src="VID-20260422-WA0010.mp4" type="video/mp4">
</video>

<script>
  const video = document.getElementById("inviteVideo");

  function startVideo() {
    video.play().catch(err => {
      console.log("Play blocked:", err);
    });
  }

  // Use BOTH click + touch (important for mobile)
  document.addEventListener("click", startVideo, { once: true });
  document.addEventListener("touchstart", startVideo, { once: true });

  // Stop at last frame
  video.addEventListener("ended", function () {
    video.pause();
    video.currentTime = video.duration;
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<body style="margin:0">

<!-- Video -->
<video id="video" width="100%" playsinline>
  <source src="VID-20260422-WA0010.mp4" type="video/mp4">
</video>

<!-- Hidden Content -->
<div id="content" style="display:none; text-align:center;">
  <h3>WE'RE GETTING MARRIED</h3>
  <h1>Om & Partner</h1>
  <p>Monday, October 19, 2026</p>
  <p>Royal Theatre</p>
</div>

<script>
  const video = document.getElementById("video");
  const content = document.getElementById("content");

  // Play only on tap anywhere
  function playVideo() {
    video.play();
    document.removeEventListener("click", playVideo);
    document.removeEventListener("touchstart", playVideo);
  }

  document.addEventListener("click", playVideo);
  document.addEventListener("touchstart", playVideo);

  // After video ends
  video.addEventListener("ended", () => {
    video.pause();
    video.currentTime = video.duration; // stay at last frame
    content.style.display = "block";
  });
</script>

</body>
</html>

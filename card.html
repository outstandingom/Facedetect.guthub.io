<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wedding Invite</title>
</head>
<body>

<!-- Video -->
<video id="inviteVideo" width="100%" playsinline>
  <source src="VID-20260422-WA0010.mp4" type="video/mp4">
</video>

<script>
  const video = document.getElementById("inviteVideo");

  // Play video on first tap/click anywhere
  document.addEventListener("click", function playVideoOnce() {
    video.play();
    document.removeEventListener("click", playVideoOnce);
  });

  // Stop at last frame (do not reset)
  video.addEventListener("ended", function () {
    video.pause();
    video.currentTime = video.duration;
  });
</script>

</body>
</html>

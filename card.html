<!DOCTYPE html>
<html>
<body style="margin:0">

<!-- Curtain Video -->
<video id="curtainVideo" width="100%" playsinline preload="auto">
  <source src="VID-20260422-WA0010.mp4" type="video/mp4">
</video>

<!-- Hidden Wedding Content -->
<div id="content" style="display:none; text-align:center;">
  <h3>WE'RE GETTING MARRIED</h3>
  <h1>Om & Partner</h1>
  <p>Monday, October 19, 2026</p>
  <p>Royal Theatre</p>
</div>

<script>
  const video = document.getElementById("curtainVideo");
  const content = document.getElementById("content");

  // Play on tap
  function start() {
    video.play();
    document.removeEventListener("click", start);
    document.removeEventListener("touchstart", start);
  }

  document.addEventListener("click", start);
  document.addEventListener("touchstart", start);

  // After video ends → show content
  video.addEventListener("ended", () => {
    content.style.display = "block";
  });
</script>

</body>
</html>

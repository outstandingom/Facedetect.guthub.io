<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wedding Invite</title>
</head>
<body>

<video id="inviteVideo" width="100%" playsinline preload="auto">
  <source src="VID-20260422-WA0010.mp4" type="video/mp4">
</video>

<script>
  const video = document.getElementById("inviteVideo");

  function playFullVideo() {
    video.currentTime = 0; // start from beginning
    video.play();

    // Ensure it keeps playing fully
    video.onpause = () => {
      if (!video.ended) {
        video.play();
      }
    };
  }

  // Works for both mobile + desktop
  document.addEventListener("click", playFullVideo, { once: true });
  document.addEventListener("touchstart", playFullVideo, { once: true });

  // Stop exactly at last frame
  video.addEventListener("ended", () => {
    video.pause();
    video.currentTime = video.duration;
  });
</script>

</body>
</html>
